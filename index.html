<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyhetskartan — gAIa Intelligence</title>
    <meta name="description" content="Interaktiv nyhetsunderrättelsekartan med AI-syntes, källtransparens och geospatial analys.">

    <!-- MapLibre GL JS -->
    <link href="https://unpkg.com/maplibre-gl@4.1.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@4.1.1/dist/maplibre-gl.js"></script>

    <!-- App CSS -->
    <link href="style.css" rel="stylesheet" />
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="header-logo">🌍</div>
            <h1>Nyhetskartan</h1>
            <button class="mobile-toggle" id="mobile-toggle" aria-label="Visa nyhetslista">☰</button>
        </div>
        <div class="header-meta">
            <span><div class="live-dot"></div> <span id="update-time">Laddar...</span></span>
            <span>📰 <span id="news-count">—</span></span>
            <span>🔴 <span id="tier1-count">—</span></span>
        </div>
    </header>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Händelser</h2>
            <div class="filter-pills">
                <button class="filter-pill active" data-filter="all">Alla</button>
                <button class="filter-pill" data-filter="tier1">Tier 1</button>
                <button class="filter-pill" data-filter="tier2">Tier 2</button>
                <button class="filter-pill" data-filter="sv">🇸🇪</button>
            </div>
        </div>
        <div class="news-list" id="news-list"></div>
        <div class="daily-brief">
            <h3>🤖 gAIa Dagsbriefing</h3>
            <p id="daily-brief-text">Laddar analys...</p>
        </div>
    </aside>

    <!-- Map -->
    <main class="map-container">
        <div id="map" role="application" aria-label="Världskarta med nyhetsmarkörer"></div>

        <!-- Detail Panel (glassmorphism overlay) -->
        <div class="detail-panel" id="detail-panel">
            <div class="detail-header">
                <div class="detail-header-content">
                    <div class="detail-header-badges">
                        <span class="tier-badge" id="detail-tier">Tier 1</span>
                        <span class="category-tag" id="detail-category"></span>
                        <span style="margin-left:auto;font-size:0.8rem;font-weight:600" id="detail-score"></span>
                    </div>
                    <h2 id="detail-title">Nyhetstitel</h2>
                    <div class="detail-location" id="detail-location">📍 Plats</div>
                </div>
                <button class="detail-close" id="detail-close" aria-label="Stäng">✕</button>
            </div>
            <div class="detail-body">
                <div class="detail-section">
                    <h3>Sammanfattning</h3>
                    <p id="detail-summary"></p>
                </div>
                <div class="detail-section">
                    <h3>Källor</h3>
                    <ul class="sources-list" id="detail-sources"></ul>
                </div>
                <div class="detail-section">
                    <h3>Scoring-kriterier</h3>
                    <div class="scoring-breakdown" id="detail-scoring"></div>
                </div>
                <div class="detail-section">
                    <div class="synthesis-card">
                        <div class="synthesis-header">
                            <div class="icon">🤖</div>
                            <span>gAIa-syntes</span>
                        </div>
                        <div class="synthesis-content" id="detail-gaia"></div>
                        <div class="synthesis-footer">⚠️ AI-genererad analys — verifiera mot primärkällor</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Legend -->
        <div class="map-legend">
            <div class="legend-item"><div class="legend-dot t1"></div> Tier 1</div>
            <div class="legend-item"><div class="legend-dot t2"></div> Tier 2</div>
        </div>
    </main>

    <!-- Loading -->
    <div class="loading-overlay" id="loading">
        <div class="loading-spinner"></div>
        <p>Laddar nyhetsunderrättelser...</p>
    </div>

    <!-- App JS -->
    <script src="app.js"></script>
</body>
</html>
